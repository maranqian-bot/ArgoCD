# ArgoCD에서 사용하는 Appliacaiton 리소스 정의
apiVersion: argoproj.io/v1a1pha1    # ArgoCD API 버전
kind: Application                   # ArgoCD Application 리소스 타입으로 사용
metadata:
  name: demo
  namespace: argocd
spec:
  project: default
  source: 
    repoURL: https://github.com/maranqian-bot/ArgoCD.git  # 배포 되는 Git 저장소
    targetRevision: master  # 사용할 브랜치
    path: apps/demo         # 해당 브랜치 내에서 사용할 디렉토리 경로

    syncPolicy: 
      automated:            # 자동 동기화 활성화(Git 변경 시 자동 배포)
      prune: true           # Git에서 삭제되면 클러스터에서도 자동 삭제
      selfHeal: true        # Git와 